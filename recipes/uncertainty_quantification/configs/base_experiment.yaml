# @package _global_

dataset_root: /nfs-gpu/research/datasets/drivaerml/preprocessed/subsampled_10x
dataset_kind: noether.data.datasets.cfd.DrivAerMLDataset

excluded_properties:
  - volume_sdf
  - volume_normals
  - surface_normals
  - surface_area 
  - surface_sdf

defaults:
  - data_specs: caeml
  - dataset_normalizers: caeml_dataset_normalizers
  - model: uq_abupt
  - trainer: uq_trainer
  - datasets: caeml_dataset
  - tracker: base_tracker
  - callbacks: uq_callback
  - pipeline: caeml_pipeline
  - /pipeline@inference_pipeline: caeml_pipeline
  - optimizer: lion
  - _self_

stage_name: train
store_code_in_output: false
output_path: ./outputs
