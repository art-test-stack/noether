- kind: noether.core.callbacks.CheckpointCallback
  every_n_epochs: 10
  save_weights: false
  save_latest_weights: true
  save_latest_optim: true
# validation loss
- kind: noether.training.callbacks.OfflineLossCallback
  batch_size: 1
  every_n_epochs: 1
  dataset_key: val
- kind: noether.core.callbacks.BestCheckpointCallback
  every_n_epochs: 1
  metric_key: loss/val/total
# evaluation metrics (denormalized MSE/MAE/L2 — comparable to baseline)
- kind: callbacks.UQSurfaceVolumeEvaluationMetricsCallback
  batch_size: 1
  every_n_epochs: 1
  dataset_key: val
  forward_properties: ${model.forward_properties}
- kind: callbacks.UQSurfaceVolumeEvaluationMetricsCallback
  batch_size: 1
  every_n_epochs: ${trainer.max_epochs}
  dataset_key: chunked_test
  forward_properties: ${model.forward_properties}
  chunked_inference: true
  chunk_properties: ${chunk_properties}
  sample_size_property: ${sample_size_property}
  chunk_size: ${chunk_size}
- kind: noether.core.callbacks.EmaCallback
  every_n_epochs: 10
  save_weights: false
  save_last_weights: false
  save_latest_weights: true
  target_factors:
    - 0.9999
- kind: callbacks.UQPostVisualizationCallback
  every_n_epochs: 100
  dataset_key: test_visualization
  batch_size: 1
  forward_properties: ${model.forward_properties}
  chunked_inference: true
  chunk_properties: ${chunk_properties}
  chunk_size: ${chunk_size}
  sample_size_property: ${sample_size_property}
  surface_vtp_root: /nfs-gpu/research/datasets/drivaerml/raw_surface_data
  query_chunk_size: 16384
  anchor_subsample_size: 16384
