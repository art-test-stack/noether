[project]
name = "diffusion-uq-recipe"
version = "0.1.0"
description = "Diffusion-based uncertainty quantification recipe for the Noether framework"
requires-python = ">=3.12"
dependencies = [
    "emmiai-noether",
    "aero-cfd-recipe",
    "scipy",
    "plotly>=6.7.0",
    "kaleido>=1.3.0",
]

# Remove the following if you are outside the Noether repo
[tool.uv.sources]
emmiai-noether = { path = "../../", editable = true }
aero-cfd-recipe = { path = "../aero_cfd", editable = true }
